---
layout: default
---
<header>
  <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
    <p>{{ site.content }}</p>
  <ul>
    {% for post in site.posts %}
      <li>
        {{ post.date | date: site.theme_config.date_format }} <a href="{{ post.url }}">{{ post.title | downcase }}</a>
      </li>
    {% endfor %}
  </ul>
</header>

{% include menu_item.html collection=site.data.menu.entries %}
